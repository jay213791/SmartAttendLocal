    </header>

    <div class="dashboardBody">

        <main class="dashboard-main">
            <div class="page-title-row">
                <a href="studenNav.html">
                    <i class="fa-solid fa-arrow-left"></i>
                    <p>Back</p>
                </a>
            </div>

            <section class="student-toolbar">
                <div class="week-card">
                    <div class="week-icon">
                        <i class="fa-regular fa-calendar-days"></i>
                    </div>
                    <div class="week-text">
                        <span class="label">This week:</span>
                        <span class="range">Nov 11 – Nov 22</span>
                    </div>
                </div>

                <div class="filter-search">
                    <div class="filter-group">
                        <span class="filter-label">Filter by:</span>
                        <button class="filter-select">
                            <span>All Class</span>
                            <i class="fa-solid fa-chevron-down"></i>
                        </button>
                    </div>
                    <div class="search-group">
                        <input type="text" placeholder="Search">
                        <button class="search-btn">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                    </div>
                </div>
            </section>

            <div class="modal" id="addStudentModal">
                <div class="modal-content">
                    <span class="close" onclick="closeAddStudentModal()">&times;</span>
                    <h2>Students Information</h2>
                    <p>Enter Students Information needed.</p>

                    <form id="studentForm">
                        <input type="text" id="StudentName" placeholder="Student Name">
                        <input type="text" id="StudentNumber" placeholder="Student Number">
                        <input type="email" id="StudentEmail" placeholder="Student Email">
                        <select id="StudentSex" required>
                            <option value="" disabled selected>Select Sex</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                        <button class="Add-Btn" onclick="submitStudentInformation()">Submit</button>
                    </form>
                </div>
            </div>

            <section class="student-table-section">
                <div class="student-table-container">
                    <table class="student-table">
                        <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Day</th>
                            <th>Time in</th>
                            <th>Time out</th>
                            <th>Duration</th>
                            <th>Status</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td class="student-cell">
                                <div class="student-info">
                                    <div class="avatar-placeholder"></div>
                                    <span>Student Class</span>
                                </div>
                            </td>
                            <td>Nov 11, 2026</td>
                            <td>7:30 AM</td>
                            <td>5:00 PM</td>
                            <td>8 hours</td>
                            <td>
                                <span class="status-text absent">Absent</span>
                                <span class="status-dot absent"></span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="pagination">
                    <button class="page-btn active">Home</button>
                    <button class="page-btn">1</button>
                    <button class="page-btn">2</button>
                    <button class="page-btn">3</button>
                </div>
            </section>
        </main>
    </div>
</div>

<script src="../script/studentTable.js" ></script>
